<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Lei2Euro</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">

<meta name="theme-color" content="#0A84FF">

</head>

<body>

<div class="container">

<div class="header">

<h1>🇷🇴 Lei2Euro</h1>

<p id="rate">
Actualizando cambio...
</p>

</div>

<div class="converter">

<div class="currency">

<label>LEI</label>

<input
id="lei"
type="number"
placeholder="0">

</div>

<button id="swap">

⇅

</button>

<div class="currency">

<label>EUR</label>

<input
id="eur"
type="number"
placeholder="0">

</div>

</div>

<div class="quick">

<button>10</button>
<button>20</button>
<button>50</button>

<button>100</button>
<button>200</button>
<button>500</button>

<button>1000</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
