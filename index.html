<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Lei2Euro</title>

<meta name="theme-color" content="#0B0B0F">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lei2Euro">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.PNG">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<div class="flags">
🇷🇴 🇪🇺
</div>

<h1>Lei2Euro</h1>

<div class="credits">
By Pulgarcito's Team
</div>

<div id="rate" class="rate">
Cargando...
</div>
    
</header>

<div class="card">

<label>🇷🇴 LEI</label>

<input
id="lei"
type="number"
inputmode="decimal"
placeholder="0">

</div>

<div class="swap">

<button id="swap" aria-label="Cambiar dirección">

<svg id="swapIcon" width="34" height="34" viewBox="0 0 24 24" fill="none">
    <path
        d="M6 18L18 6M18 6H10M18 6V14"
        stroke="white"
        stroke-width="2.8"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>

</button>

<div id="direction" class="direction">
LEI → EUR
</div>

<div class="card">

<label>🇪🇺 EUR</label>

<input
id="eur"
type="text"
readonly
placeholder="0">

</div>

<div class="quick">

<button data-value="10">10</button>
<button data-value="20">20</button>
<button data-value="50">50</button>
<button data-value="100">100</button>

<button data-value="200">200</button>
<button data-value="500">500</button>
<button data-value="1000">1000</button>
<button data-value="2000">2000</button>

</div>

<footer>

Made with ❤️

</footer>

</div>

<script src="app.js"></script>

</body>

</html>
