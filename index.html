<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Lei2Euro</title>

<meta name="theme-color" content="#0b0b0f">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lei2Euro">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<link rel="apple-touch-icon" href="icon-192.png">

</head>

<body>

<div class="container">

<header class="header">

<div class="flags">
<span>🇷🇴</span>
<span>🇪🇺</span>
</div>

<h1>Lei2Euro</h1>

<div id="rate" class="rate">
Cargando cambio...
</div>

<p class="credits">
By Pulgarcito's Team
</p>

</header>

<main>

<section class="card">

<div class="currencyTitle">
🇷🇴 LEI
</div>

<input
id="lei"
type="number"
inputmode="decimal"
placeholder="0"
autocomplete="off">

</section>

<div class="swapContainer">

<button id="swap">

⇅

</button>

</div>

<section class="card">

<div class="currencyTitle">
🇪🇺 EUR
</div>

<input
id="eur"
type="number"
inputmode="decimal"
placeholder="0"
autocomplete="off">

</section>

<section class="quick">

<button>10</button>
<button>20</button>
<button>50</button>
<button>100</button>
<button>200</button>
<button>500</button>
<button>1000</button>
<button>2000</button>

</section>

</main>

<footer>

Made with ❤️ in Spain

</footer>

</div>

<script src="app.js"></script>

</body>

</html>
